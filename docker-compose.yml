services:
  librelingo:
    build: .
    image: librelingo-tools:latest
    working_dir: /app
    user: "${UID:-0}:${GID:-0}"
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./courses:/data/courses
      - ./apps/web:/app/apps/web:cached
      - ./apps/web/src/courses:/data/web-courses
    stdin_open: true
    tty: true
    command: ["tail", "-f", "/dev/null"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: librelingo-web:latest
    working_dir: /app/apps/web
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    command: ["sh", "-c", "npm run prepareCourses && npm install --prefer-offline --no-audit --no-fund && npm run dev -- --host 0.0.0.0"]
