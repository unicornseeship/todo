name: Bug report
about: Create a report to help us improve.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to make LibreLingoRelive better!

  - type: checkboxes
    attributes:
      label: Please confirm that;
      options:
        - label: Your question is related to the main code and not courses or documentations.
          required: true
        - label: I have searched the [issues]https://codeberg.org/LibreLingoRelive/LibreLingoRelive), and I didn't find an answer to my question.
          required: true
        - label: I have read and understood the [Codeberg Terms of Use](https://codeberg.org/Codeberg/org/src/branch/main/TermsOfUse.md) for images or other type of content that I included here.
          required: true
  - type: input
    id: version
    attributes:
      label: What is your LibreLingoRelive version?
      description: include tag / commit SHA.
      placeholder: e.g. commit 1adce91411 
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: What happened?
      description: >
        Please note that new issues about already solved/documented topics
        **could be closed without further comments.** Same for too generic or incomplete reports.
      placeholder: If you want to include logs, don't include it here. Use the next text field for that.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Do you have logs?
      description: >
        If possible, please attach logs
        that might help identifying the problem. This will be automatically formatted into 
        code, so no need for backticks.
      render: shell